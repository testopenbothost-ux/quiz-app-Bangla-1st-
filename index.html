<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>বাংলা MCQ ক্যুইজ (ডার্ক)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Sans Bengali', system-ui, -apple-system, sans-serif;
            background: #0f0f13;
            color: #e4e4e7;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            background: #1c1c22;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
            padding: 24px 20px 20px;
            transition: all 0.2s;
            border: 1px solid #2a2a30;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: #f0f0f4;
        }
        h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #8888a0;
            margin-left: auto;
        }
        .subhead {
            font-size: 14px;
            color: #8888a0;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a32;
            padding-bottom: 14px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #b0b0c0;
        }
        .stats-row span {
            background: #2a2a32;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 500;
            color: #d0d0dd;
        }
        .progress-wrap {
            background: #2a2a32;
            border-radius: 40px;
            height: 6px;
            margin: 8px 0 18px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #6c9e8a;
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .question-card {
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 13px;
            color: #8888a0;
        }
        .q-number {
            font-weight: 600;
            color: #6c9e8a;
            background: #1e2a26;
            padding: 0 14px;
            border-radius: 40px;
            font-size: 13px;
            line-height: 28px;
            border: 1px solid #2d3f38;
        }
        .context-box {
            background: #1a2220;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 18px;
            border-left: 4px solid #6c9e8a;
            color: #c0d6ce;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            font-weight: 400;
            border: 1px solid #2a3a34;
        }
        .q-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 22px;
            font-weight: 500;
            color: #f0f0f4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }
        .option {
            background: #26262e;
            border: 1.5px solid #33333c;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 16px;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            color: #e0e0e8;
        }
        .option:hover {
            background: #2e2e38;
            border-color: #4a4a58;
        }
        .option.selected {
            border-color: #6c9e8a;
            background: #1e2e28;
        }
        .option.correct {
            border-color: #4f8b74;
            background: #1c2d26;
        }
        .option.wrong {
            border-color: #b05a5a;
            background: #2e1e1e;
        }
        .option.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option .label {
            font-weight: 600;
            color: #a0a0b5;
            min-width: 24px;
            flex-shrink: 0;
        }
        .option .text {
            flex: 1;
        }
        .option .check {
            margin-left: auto;
            font-size: 18px;
            color: #4f8b74;
        }
        .option .cross {
            margin-left: auto;
            font-size: 18px;
            color: #b05a5a;
        }
        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .btn {
            border: none;
            background: #6c9e8a;
            color: #0f0f13;
            font-weight: 600;
            font-size: 15px;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1 1 auto;
            min-width: 100px;
            text-align: center;
            font-family: inherit;
            letter-spacing: 0.2px;
        }
        .btn:hover {
            background: #5b8b77;
            transform: scale(0.98);
            color: #0f0f13;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-outline {
            background: transparent;
            color: #6c9e8a;
            border: 1.5px solid #6c9e8a;
        }
        .btn-outline:hover {
            background: #1e2e28;
            color: #8fc4ae;
        }
        .btn-secondary {
            background: #2e2e38;
            color: #d0d0dd;
        }
        .btn-secondary:hover {
            background: #3a3a46;
            color: #f0f0f4;
        }
        .btn-danger {
            background: #b05a5a;
            color: #0f0f13;
        }
        .btn-danger:hover {
            background: #9a4a4a;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .score-box {
            background: #1a1a22;
            border-radius: 20px;
            padding: 16px 20px;
            margin: 16px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #2a2a32;
        }
        .score-box .big {
            font-size: 28px;
            font-weight: 700;
            color: #f0f0f4;
        }
        .score-box .detail {
            color: #8888a0;
            font-size: 14px;
        }
        .mode-tag {
            display: inline-block;
            background: #1e2a26;
            color: #6c9e8a;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 16px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            border: 1px solid #2d3f38;
        }
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: #a0a0b5;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state h3 {
            color: #f0f0f4;
        }
        .footer-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
            border-top: 1px solid #2a2a32;
            padding-top: 18px;
        }
        .footer-actions .btn {
            flex: 1;
            min-width: 80px;
            font-size: 13px;
            padding: 10px 16px;
        }
        .explanation {
            background: #1a2220;
            border-radius: 16px;
            padding: 14px 18px;
            margin: 12px 0 16px;
            font-size: 15px;
            line-height: 1.6;
            border-left: 4px solid #6c9e8a;
            color: #c0d6ce;
        }
        .credit-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #666680;
            border-top: 1px solid #2a2a32;
            padding-top: 16px;
            letter-spacing: 0.2px;
        }
        .credit-footer strong {
            color: #8a8aa0;
        }
        .credit-footer .vibecode {
            display: inline-block;
            background: #1e2a26;
            color: #6c9e8a;
            padding: 0 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
            border: 1px solid #2d3f38;
        }
        @media (max-width: 500px) {
            .app-container {
                padding: 16px 12px;
            }
            .q-text {
                font-size: 16px;
            }
            .option {
                font-size: 14px;
                padding: 12px 14px;
            }
            .btn {
                font-size: 14px;
                padding: 10px 18px;
                min-width: 70px;
            }
            h1 {
                font-size: 19px;
            }
            .score-box .big {
                font-size: 22px;
            }
        }
        @media (max-width: 380px) {
            .option {
                font-size: 13px;
                padding: 10px 12px;
                gap: 8px;
            }
            .q-text {
                font-size: 15px;
            }
            .btn {
                font-size: 12px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- header -->
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
            <h1>
                📘 বাংলা MCQ
                <small>৩৫০</small>
            </h1>
            <span id="modeTag" class="mode-tag">প্র্যাকটিস</span>
        </div>
        <div class="subhead">
            <div class="stats-row">
                <span id="progressText">০ / ৩৫০</span>
                <span id="wrongCount">❌ ০</span>
            </div>
            <span id="sessionLabel" style="font-size:13px;color:#666680;">সেশন #১</span>
        </div>
        <div class="progress-wrap">
            <div id="progressBar" class="progress-bar" style="width:0%;"></div>
        </div>

        <!-- main area -->
        <div id="mainArea">
            <div class="question-card" id="questionCard">
                <div class="q-header">
                    <span class="q-number" id="qNum">প্রশ্ন ১</span>
                    <span id="qStatus" style="font-size:13px;color:#666680;">২৫ টি প্রশ্ন</span>
                </div>
                <div id="contextBox" class="context-box" style="display:none;"></div>
                <div class="q-text" id="qText">লোড হচ্ছে...</div>
                <div class="options" id="optionsContainer"></div>
                <div id="explanationBox" style="display:none;" class="explanation"></div>
                <div class="action-row">
                    <button class="btn" id="submitBtn">জমা দিন</button>
                    <button class="btn btn-outline" id="nextBtn" style="display:none;">পরবর্তী →</button>
                </div>
            </div>
        </div>

        <!-- score / result -->
        <div id="resultArea" style="display:none;">
            <div class="score-box">
                <div>
                    <div class="detail">সেশন স্কোর</div>
                    <div class="big" id="sessionScore">০/২৫</div>
                </div>
                <div style="text-align:right;">
                    <div class="detail">সঠিক</div>
                    <div style="font-size:20px;font-weight:600;color:#4f8b74;" id="correctCount">০</div>
                </div>
                <div style="text-align:right;">
                    <div class="detail">ভুল</div>
                    <div style="font-size:20px;font-weight:600;color:#b05a5a;" id="wrongCountDisplay">০</div>
                </div>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <button class="btn" id="nextSessionBtn">পরবর্তী সেশন</button>
                <button class="btn btn-outline" id="reviewIncorrectBtn">❌ ভুল প্রশ্নগুলো</button>
                <button class="btn btn-secondary" id="resetProgressBtn" style="flex:0.5;">⟳ রিসেট</button>
            </div>
        </div>

        <!-- footer actions -->
        <div class="footer-actions">
            <button class="btn btn-secondary" id="resetAllBtn" style="flex:0.4;">⟳ সব রিসেট</button>
            <button class="btn btn-outline" id="switchModeBtn" style="flex:0.6;">📋 ভুল পর্যালোচনা</button>
        </div>

        <!-- credit footer -->
        <div class="credit-footer">
            <span>Questions collected &amp; verified by <strong>Akash</strong></span>
            <span style="margin:0 6px;">·</span>
            <span>Vibecoded with</span>
            <span class="vibecode">DeepSeek</span>
            <span style="margin:0 4px;">&amp;</span>
            <span class="vibecode">Claude Sonnet 3.5/5</span>
        </div>
    </div>

    <script>

            "options": ["আধুনিক নারী", "অন্ধবিশ্বাস", "মাতৃভক্তি", "স্বাধীনচেতা নারী"],

        // ============================================================
        //  QUIZ ENGINE
        // ============================================================
        const STORAGE_KEY = 'bengali_quiz_350_data';
        const SESSION_SIZE = 25;

        let state = {
            allIds: [],
            practiced: [],
            incorrect: [],
            currentSession: [],
            sessionIndex: 0,
            answered: false,
            sessionScore: { correct: 0, wrong: 0 },
            mode: 'practice',
            reviewQueue: [],
        };

        let currentQuestionId = null;

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const saved = JSON.parse(raw);
                    state.practiced = saved.practiced || [];
                    state.incorrect = saved.incorrect || [];
                    state.mode = saved.mode || 'practice';
                }
            } catch (e) { /* ignore */ }
            state.allIds = QUESTIONS.map(q => q.id);
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    practiced: state.practiced,
                    incorrect: state.incorrect,
                    mode: state.mode,
                }));
            } catch (e) { /* ignore */ }
        }

        function getQuestion(id) {
            return QUESTIONS.find(q => q.id === id);
        }

        function getAvailableIds() {
            const practicedSet = new Set(state.practiced);
            return state.allIds.filter(id => !practicedSet.has(id));
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pickSession() {
            if (state.mode === 'review') {
                const available = state.incorrect.slice();
                if (available.length === 0) return [];
                return shuffleArray(available).slice(0, SESSION_SIZE);
            } else {
                const available = getAvailableIds();
                if (available.length === 0) return [];
                return shuffleArray(available).slice(0, SESSION_SIZE);
            }
        }

        function startNewSession() {
            const ids = pickSession();
            if (ids.length === 0) {
                showEmptyState();
                return;
            }
            state.currentSession = ids;
            state.sessionIndex = 0;
            state.answered = false;
            state.sessionScore = { correct: 0, wrong: 0 };
            renderQuestion();
            updateProgress();
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('modeTag').textContent = state.mode === 'review' ? 'ভুল পর্যালোচনা' : 'প্র্যাকটিস';
        }

        function showEmptyState() {
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('resultArea').style.display = 'none';
            const main = document.getElementById('mainArea');
            main.innerHTML = `
            <div class="empty-state">
              <div class="icon">🎉</div>
              <h3 style="margin-bottom:8px;">সব প্রশ্ন শেষ!</h3>
              <p style="color:#8888a0;font-size:15px;">
                ${state.mode === 'review' ? 'আপনি সব ভুল প্রশ্ন পর্যালোচনা করেছেন।' : 'আপনি সব ৩৫০টি প্রশ্ন অনুশীলন করেছেন।'}
              </p>
              <button class="btn" style="margin-top:16px;" onclick="resetAll()">⟳ নতুন করে শুরু</button>
            </div>
          `;
        }

        function renderQuestion() {
            const ids = state.currentSession;
            if (!ids || ids.length === 0 || state.sessionIndex >= ids.length) {
                showResult();
                return;
            }
            const id = ids[state.sessionIndex];
            currentQuestionId = id;
            const q = getQuestion(id);
            if (!q) { showResult(); return; }

            document.getElementById('qNum').textContent = `প্রশ্ন ${state.sessionIndex + 1} / ${ids.length}`;
            document.getElementById('qStatus').textContent = state.mode === 'review' ? 'পর্যালোচনা মোড' : `সেশন #${getSessionNumber()}`;
            
            // context
            const contextBox = document.getElementById('contextBox');
            if (q.context) {
                contextBox.textContent = q.context;
                contextBox.style.display = 'block';
            } else {
                contextBox.style.display = 'none';
            }

            document.getElementById('qText').textContent = q.question;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            const labels = ['ক', 'খ', 'গ', 'ঘ'];
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.dataset.index = idx;
                div.innerHTML = `
              <span class="label">${labels[idx]}.</span>
              <span class="text">${opt}</span>
            `;
                div.addEventListener('click', () => onOptionClick(idx, div));
                container.appendChild(div);
            });

            document.getElementById('explanationBox').style.display = 'none';
            document.getElementById('explanationBox').textContent = '';
            state.answered = false;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = 'জমা দিন';

            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected', 'correct', 'wrong', 'disabled'));
            selectedOptionIndex = null;
            updateProgress();
            saveState();
        }

        let selectedOptionIndex = null;

        function onOptionClick(index, el) {
            if (state.answered) return;
            document.querySelectorAll('.option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedOptionIndex = index;
        }

        function submitAnswer() {
            if (state.answered) return;
            if (selectedOptionIndex === null) {
                const btn = document.getElementById('submitBtn');
                btn.textContent = '⚠️ একটি উত্তর নির্বাচন করুন';
                setTimeout(() => { btn.textContent = 'জমা দিন'; }, 1200);
                return;
            }
            const id = currentQuestionId;
            const q = getQuestion(id);
            if (!q) return;
            const labels = ['ক', 'খ', 'গ', 'ঘ'];
            const selectedLabel = labels[selectedOptionIndex];
            const isCorrect = (selectedLabel === q.correct);

            const options = document.querySelectorAll('.option');
            options.forEach((el, idx) => {
                el.classList.add('disabled');
                const label = labels[idx];
                if (label === q.correct) {
                    el.classList.add('correct');
                    el.innerHTML += `<span class="check">✓</span>`;
                } else if (idx === selectedOptionIndex && !isCorrect) {
                    el.classList.add('wrong');
                    el.innerHTML += `<span class="cross">✗</span>`;
                }
            });

            state.answered = true;
            if (isCorrect) {
                state.sessionScore.correct++;
                const pos = state.incorrect.indexOf(id);
                if (pos !== -1) state.incorrect.splice(pos, 1);
            } else {
                state.sessionScore.wrong++;
                if (!state.incorrect.includes(id)) {
                    state.incorrect.push(id);
                }
            }
            if (!state.practiced.includes(id)) {
                state.practiced.push(id);
            }

            if (q.explanation) {
                const box = document.getElementById('explanationBox');
                box.textContent = '💡 ' + q.explanation;
                box.style.display = 'block';
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').textContent =
                (state.sessionIndex + 1 < state.currentSession.length) ? 'পরবর্তী →' : 'ফলাফল দেখুন';

            updateProgress();
            saveState();
        }

        function nextQuestion() {
            state.sessionIndex++;
            if (state.sessionIndex < state.currentSession.length) {
                selectedOptionIndex = null;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            const total = state.currentSession.length;
            const correct = state.sessionScore.correct;
            const wrong = state.sessionScore.wrong;
            document.getElementById('sessionScore').textContent = `${correct}/${total}`;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCountDisplay').textContent = wrong;
            document.getElementById('sessionLabel').textContent = `সেশন #${getSessionNumber()} · ${state.mode === 'review' ? 'পর্যালোচনা' : 'প্র্যাকটিস'}`;
            updateProgress();
        }

        function getSessionNumber() {
            return Math.floor(state.practiced.length / SESSION_SIZE) + 1;
        }

        function updateProgress() {
            const total = state.allIds.length;
            const done = state.practiced.length;
            const pct = Math.min(100, Math.round((done / total) * 100));
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${done} / ${total}`;
            document.getElementById('wrongCount').textContent = `❌ ${state.incorrect.length}`;
        }

        function startReviewMode() {
            if (state.incorrect.length === 0) {
                alert('❌ কোন ভুল প্রশ্ন নেই! আপনি সব প্রশ্ন সঠিক উত্তর দিয়েছেন।');
                return;
            }
            state.mode = 'review';
            const shuffled = shuffleArray(state.incorrect);
            state.currentSession = shuffled.slice(0, SESSION_SIZE);
            state.sessionIndex = 0;
            state.answered = false;
            state.sessionScore = { correct: 0, wrong: 0 };
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('modeTag').textContent = 'ভুল পর্যালোচনা';
            renderQuestion();
            saveState();
        }

        function switchToPractice() {
            state.mode = 'practice';
            const available = getAvailableIds();
            if (available.length === 0 && state.practiced.length >= state.allIds.length) {
                showEmptyState();
                document.getElementById('modeTag').textContent = 'প্র্যাকটিস';
                saveState();
                return;
            }
            startNewSession();
            document.getElementById('modeTag').textContent = 'প্র্যাকটিস';
            saveState();
        }

        function resetAll() {
            if (confirm('সকল অগ্রগতি রিসেট করবেন? (সমস্ত প্রশ্ন নতুন করে শুরু হবে)')) {
                state.practiced = [];
                state.incorrect = [];
                state.mode = 'practice';
                saveState();
                document.getElementById('resultArea').style.display = 'none';
                document.getElementById('questionCard').style.display = 'block';
                // rebuild mainArea if empty state was shown
                const main = document.getElementById('mainArea');
                main.innerHTML = `
              <div class="question-card" id="questionCard">
                <div class="q-header"><span class="q-number" id="qNum">প্রশ্ন ১</span><span id="qStatus" style="font-size:13px;color:#666680;">২৫ টি প্রশ্ন</span></div>
                <div id="contextBox" class="context-box" style="display:none;"></div>
                <div class="q-text" id="qText">লোড হচ্ছে...</div>
                <div class="options" id="optionsContainer"></div>
                <div id="explanationBox" style="display:none;" class="explanation"></div>
                <div class="action-row"><button class="btn" id="submitBtn">জমা দিন</button><button class="btn btn-outline" id="nextBtn" style="display:none;">পরবর্তী →</button></div>
              </div>
            `;
                document.getElementById('submitBtn').addEventListener('click', submitAnswer);
                document.getElementById('nextBtn').addEventListener('click', nextQuestion);
                startNewSession();
            }
        }

        function resetProgress() {
            if (confirm('অগ্রগতি রিসেট করবেন? (শুধু practiced ও incorrect রিসেট হবে)')) {
                state.practiced = [];
                state.incorrect = [];
                state.mode = 'practice';
                saveState();
                document.getElementById('resultArea').style.display = 'none';
                document.getElementById('questionCard').style.display = 'block';
                const main = document.getElementById('mainArea');
                main.innerHTML = `
              <div class="question-card" id="questionCard">
                <div class="q-header"><span class="q-number" id="qNum">প্রশ্ন ১</span><span id="qStatus" style="font-size:13px;color:#666680;">২৫ টি প্রশ্ন</span></div>
                <div id="contextBox" class="context-box" style="display:none;"></div>
                <div class="q-text" id="qText">লোড হচ্ছে...</div>
                <div class="options" id="optionsContainer"></div>
                <div id="explanationBox" style="display:none;" class="explanation"></div>
                <div class="action-row"><button class="btn" id="submitBtn">জমা দিন</button><button class="btn btn-outline" id="nextBtn" style="display:none;">পরবর্তী →</button></div>
              </div>
            `;
                document.getElementById('submitBtn').addEventListener('click', submitAnswer);
                document.getElementById('nextBtn').addEventListener('click', nextQuestion);
                startNewSession();
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadState();
            if (state.practiced.length === 0) {
                state.mode = 'practice';
                saveState();
            }
            // check if all done in practice mode
            if (state.mode === 'practice' && getAvailableIds().length === 0 && state.practiced.length >= state.allIds
                .length) {
                if (state.incorrect.length > 0) {
                    document.getElementById('questionCard').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'none';
                    const main = document.getElementById('mainArea');
                    main.innerHTML = `
                <div class="empty-state">
                  <div class="icon">✅</div>
                  <h3 style="margin-bottom:8px;">সব প্রশ্ন অনুশীলন সম্পন্ন!</h3>
                  <p style="color:#8888a0;font-size:15px;margin-bottom:12px;">
                    আপনার ${state.incorrect.length} টি ভুল প্রশ্ন আছে। পর্যালোচনা করুন।
                  </p>
                  <button class="btn" onclick="startReviewMode()">❌ ভুল প্রশ্ন পর্যালোচনা</button>
                  <button class="btn btn-secondary" style="margin-top:8px;" onclick="resetAll()">⟳ নতুন করে শুরু</button>
                </div>
              `;
                    document.getElementById('modeTag').textContent = 'প্র্যাকটিস';
                    updateProgress();
                    return;
                }
                document.getElementById('questionCard').style.display = 'none';
                document.getElementById('resultArea').style.display = 'none';
                const main = document.getElementById('mainArea');
                main.innerHTML = `
              <div class="empty-state">
                <div class="icon">🏆</div>
                <h3 style="margin-bottom:8px;">অভিনন্দন! 🎉</h3>
                <p style="color:#8888a0;font-size:15px;">আপনি সব ৩৫০টি প্রশ্ন সঠিকভাবে অনুশীলন করেছেন!</p>
                <button class="btn" style="margin-top:16px;" onclick="resetAll()">⟳ নতুন করে শুরু</button>
              </div>
            `;
                document.getElementById('modeTag').textContent = 'প্র্যাকটিস';
                updateProgress();
                return;
            }

            // Normal start
            startNewSession();

            document.getElementById('submitBtn').addEventListener('click', submitAnswer);
            document.getElementById('nextBtn').addEventListener('click', nextQuestion);
            document.getElementById('nextSessionBtn').addEventListener('click', function() {
                if (state.mode === 'review') {
                    const reviewedInSession = state.currentSession || [];
                    const notReviewed = state.incorrect.filter(id => !reviewedInSession.includes(id));
                    if (notReviewed.length > 0) {
                        startReviewMode();
                        return;
                    } else if (state.incorrect.length > 0) {
                        alert('আপনি সব ভুল প্রশ্ন পর্যালোচনা করেছেন। এখন প্র্যাকটিস মোডে ফিরে যান।');
                        switchToPractice();
                        return;
                    } else {
                        switchToPractice();
                        return;
                    }
                } else {
                    const available = getAvailableIds();
                    if (available.length === 0) {
                        if (state.incorrect.length > 0) {
                            const c = confirm('সব প্রশ্ন শেষ! ভুল প্রশ্নগুলো পর্যালোচনা করবেন?');
                            if (c) startReviewMode();
                            else resetAll();
                        } else {
                            alert('অভিনন্দন! সব প্রশ্ন সঠিকভাবে অনুশীলন করেছেন!');
                            resetAll();
                        }
                        return;
                    }
                    startNewSession();
                }
            });
            document.getElementById('reviewIncorrectBtn').addEventListener('click', function() {
                if (state.incorrect.length === 0) {
                    alert('❌ কোন ভুল প্রশ্ন নেই!');
                    return;
                }
                startReviewMode();
            });
            document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
            document.getElementById('resetAllBtn').addEventListener('click', resetAll);
            document.getElementById('switchModeBtn').addEventListener('click', function() {
                if (state.mode === 'practice') {
                    if (state.incorrect.length === 0) {
                        alert('❌ কোন ভুল প্রশ্ন নেই!');
                        return;
                    }
                    startReviewMode();
                } else {
                    switchToPractice();
                }
            });
        });

        window.startReviewMode = startReviewMode;
        window.switchToPractice = switchToPractice;
        window.resetAll = resetAll;
        window.resetProgress = resetProgress;
    </script>
</body>
</html>
